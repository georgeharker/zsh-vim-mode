name: docs (branch push)

on:
  workflow_dispatch:   # manual run: deploys the selected branch to its prefix
  push:
    branches: [main]
    paths:
      - "README.md"
      - "index.md"
      - "_quarto.yml"
      - "scripts/check-docs.zsh"
      - ".github/workflows/docs-on-change.yml"
      - ".github/actions/deploy-docs/**"

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Inert until the deploy vars/secrets are configured on the repo.
    if: ${{ vars.DOCS_SSH_DEST != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/deploy-docs
        with:
          target-prefix: ${{ github.ref_name }}
          ssh-dest: ${{ vars.DOCS_SSH_DEST }}
          site-url: ${{ vars.DOCS_SITE_URL }}
          deploy-key: ${{ secrets.DOCS_DEPLOY_KEY }}
          host-key: ${{ secrets.DOCS_HOST_KEY }}
